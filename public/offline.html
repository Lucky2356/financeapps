<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#149365" />
    <title>Финансовый помощник офлайн</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #172033;
      }
      main {
        width: min(92vw, 420px);
        border: 1px solid #d7dee8;
        border-radius: 12px;
        padding: 24px;
        background: white;
        box-shadow: 0 18px 50px -35px rgba(15, 23, 42, 0.55);
      }
      h1 {
        margin: 0;
        font-size: 22px;
      }
      p {
        margin: 12px 0 0;
        color: #576173;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет подключения</h1>
      <p>Откройте приложение снова, когда сеть станет доступна. Локальные адаптеры под desktop/mobile заложены для следующих итераций.</p>
    </main>
    <script>
      if ("serviceWorker" in navigator && (location.hostname.includes("tauri") || location.protocol !== "http:" && location.protocol !== "https:")) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          return Promise.all(registrations.map((registration) => registration.unregister()));
        }).then(() => location.replace("/"));
      }
    </script>
  </body>
</html>
