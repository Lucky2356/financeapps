# Production compose that PULLS prebuilt images from GHCR (no on-server build).
# Use on a weak VPS:  docker compose -f docker-compose.prod.yml pull && \
#                     docker compose -f docker-compose.prod.yml up -d
# Images are produced by .github/workflows/web-image.yml (manual run).
services:
  postgres:
    image: postgres:16-alpine
    container_name: financial-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-financial_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/lucky2356/financeapps-migrate:latest
    container_name: financial-assistant-migrate
    command: ["sh", "-c", "npx prisma migrate deploy && npx tsx prisma/seed-reference.ts"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-financial_assistant}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: ghcr.io/lucky2356/financeapps-web:latest
    container_name: financial-assistant-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Internal-only: Caddy proxies to web:3000 over the compose network. Not
    # published to the host, so all external traffic must go through Caddy TLS.
    expose:
      - "3000"
    environment:
      # connection_limit keeps Prisma's pool modest on a small single instance.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-financial_assistant}?connection_limit=10
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_TRUST_HOST: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional: error monitoring (set to your Sentry DSN to enable).
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: production

  # HTTPS termination (self-signed, no domain). Access via https://<server-ip>.
  caddy:
    image: caddy:2-alpine
    container_name: financial-assistant-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # Daily PostgreSQL backups to a volume (prunes after BACKUP_RETENTION_DAYS).
  backup:
    image: postgres:16-alpine
    container_name: financial-assistant-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-financial_assistant}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./scripts/db-backup.sh:/db-backup.sh:ro
      - db-backups:/backups
    entrypoint: ["sh", "/db-backup.sh"]

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  db-backups:
