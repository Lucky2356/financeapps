services:
  postgres:
    image: postgres:16-alpine
    container_name: financial-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in .env}
    # No host port mapping in production — the DB is reachable only on the
    # internal compose network. (Add a mapping only if you need external access.)
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-financial_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies Prisma migrations, then exits. Uses the builder stage
  # (which has the prisma CLI + schema); the web image stays slim.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: financial-assistant-migrate
    # Apply migrations, then seed reference data (risk profiles) idempotently.
    command: ["sh", "-c", "npx prisma migrate deploy && npx tsx prisma/seed-reference.ts"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-financial_assistant}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-assistant-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # Internal-only: reachable on the compose network (Caddy proxies to web:3000),
    # NOT published to the host. This forces all external traffic through Caddy's
    # TLS on :443. To debug locally, temporarily add: ports: ["127.0.0.1:3000:3000"].
    expose:
      - "3000"
    environment:
      # connection_limit keeps Prisma's pool modest on a small single instance.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-financial_assistant}?connection_limit=10
      # NextAuth: required secret + trust the Host header (accessed by IP/proxy).
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_TRUST_HOST: "true"
      # Optional: server-side AI key for /api/ai/parse on the web.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional: error monitoring (set to your Sentry DSN to enable).
      SENTRY_DSN: ${SENTRY_DSN:-}
      NODE_ENV: production

  # HTTPS termination (self-signed, no domain). Access via https://<server-ip>.
  # This is the ONLY public entry point — the web container is not host-published.
  caddy:
    image: caddy:2-alpine
    container_name: financial-assistant-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  # Daily PostgreSQL backups to a volume (prunes after BACKUP_RETENTION_DAYS).
  backup:
    image: postgres:16-alpine
    container_name: financial-assistant-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in .env}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-financial_assistant}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./scripts/db-backup.sh:/db-backup.sh:ro
      - db-backups:/backups
    entrypoint: ["sh", "/db-backup.sh"]

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  db-backups:
