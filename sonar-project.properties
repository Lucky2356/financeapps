# SonarCloud analysis configuration (read by Automatic Analysis).

sonar.projectKey=Lucky2356_financeapps
sonar.organization=lucky2356

# The i18n catalog (lib/i18n/catalog.ts) holds two parallel translation blocks —
# Russian and English — with identical keys and structure. The copy-paste
# detector flags them as ~98% duplicated, which is a false positive for a
# bilingual message catalog: the "duplication" is the translation itself, not
# copied logic. Exclude the catalog from duplication detection only; it is still
# fully analyzed for bugs, code smells and security.
sonar.cpd.exclusions=lib/i18n/catalog.ts

# Tests and generated Prisma client are not product code — keep them out of
# coverage accounting so the coverage metric reflects the app itself.
sonar.coverage.exclusions=tests/**,**/*.test.ts,**/*.test.tsx,lib/generated/**,scripts/**
