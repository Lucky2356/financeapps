name: Build & Push Web Image

# Builds the web Docker images in CI and pushes them to GHCR, so a weak VPS can
# just `pull` instead of building Next itself (~2 GB RAM). Manual trigger.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/lucky2356/financeapps-web
  MIGRATE_IMAGE: ghcr.io/lucky2356/financeapps-migrate

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Slim runtime image (Next standalone) — serves the app.
      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Builder-stage image (has prisma CLI + tsx + schema) — runs migrations
      # and seeds reference data, then exits. Used by the one-shot migrate service.
      - name: Build & push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: ${{ env.MIGRATE_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
