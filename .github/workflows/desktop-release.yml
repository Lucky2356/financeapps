name: Windows Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Версия для публикации релиза, напр. v1.0.1. Пусто = только собрать артефакт без публикации."
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    env:
      NEXT_PUBLIC_APP_PLATFORM: desktop
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_API_MODE: local
      NEXT_PUBLIC_DESKTOP_DATA_MODE: local
      NEXT_OUTPUT: export
      # True only when an updater signing key secret is configured. Gates the
      # signed-build + manifest path so the workflow still produces a plain
      # installer before keys are set up. Accepts either the standard
      # TAURI_SIGNING_PRIVATE_KEY or the AUTO_UPDATE secret name.
      HAS_SIGNING_KEY: ${{ (secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.AUTO_UPDATE) != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Resolve the release tag FIRST so a malformed version fails in seconds,
      # not after the ~10-minute build. Trims all whitespace (the usual cause of
      # "tag_name is not well-formed" — a stray space from copy-paste) and
      # validates the shape (vX.Y.Z). Read via env to avoid shell injection.
      - name: Resolve release target
        id: rel
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ver="$(printf '%s' "$INPUT_VERSION" | tr -d '[:space:]')"
          if [ -z "$ver" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No version entered — build only, no Release."
          elif printf '%s' "$ver" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$'; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "tag=$ver" >> "$GITHUB_OUTPUT"
            echo "Release tag: $ver"
          else
            echo "::error::Некорректная версия '$INPUT_VERSION'. Введите vX.Y.Z, например v1.0.2"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build static desktop shell
        run: npm run build:static

      - name: Desktop preflight
        run: npm run desktop:preflight

      - name: Build Tauri Windows bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || secrets.AUTO_UPDATE }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ "$HAS_SIGNING_KEY" = "true" ]; then
            echo "Signing key present — building signed updater artifacts"
            npm run tauri:build -- --config src-tauri/tauri.updater.conf.json
          else
            echo "No signing key — building a plain installer (no auto-update artifacts)"
            npm run tauri:build
          fi

      # GATE: prove the just-built signature verifies against the public key baked
      # into the app (and into every already-installed client). If it doesn't,
      # those installs could not auto-update to this build — fail before publishing
      # so a broken update never reaches users (this is exactly what broke 1.0.2→1.0.3).
      - name: Verify updater signature against baked pubkey
        if: env.HAS_SIGNING_KEY == 'true'
        shell: bash
        run: |
          exe="$(ls src-tauri/target/release/bundle/nsis/*-setup.exe | head -1)"
          node scripts/verify-updater-signature.mjs "$exe" "$exe.sig"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: financial-assistant-windows
          path: |
            src-tauri/target/release/financial-assistant.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # Generates the updater manifest (latest.json) from the signed .sig so the
      # in-app updater can find and verify the new version. Only when signing.
      - name: Generate updater manifest
        if: steps.rel.outputs.publish == 'true' && env.HAS_SIGNING_KEY == 'true'
        shell: bash
        run: node scripts/make-latest-json.mjs "${{ steps.rel.outputs.tag }}"

      # Publishes a GitHub Release with the installer attached so end users can
      # download it from the Releases page. action-gh-release creates the tag if
      # it does not exist yet. The .sig and latest.json are uploaded when signing
      # so /releases/latest/download/latest.json resolves for the updater.
      - name: Publish GitHub Release
        if: steps.rel.outputs.publish == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: Финансовый помощник ${{ steps.rel.outputs.tag }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/nsis/latest.json
