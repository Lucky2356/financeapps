name: Windows Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    env:
      NEXT_PUBLIC_APP_PLATFORM: desktop
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_API_MODE: local
      NEXT_PUBLIC_DESKTOP_DATA_MODE: local
      NEXT_OUTPUT: export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build static desktop shell
        run: npm run build:static

      - name: Desktop preflight
        run: npm run desktop:preflight

      - name: Build Tauri Windows bundle
        run: npm run tauri:build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: financial-assistant-windows
          path: |
            src-tauri/target/release/financial-assistant.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # On a version tag, publish a GitHub Release with the installer attached so
      # end users can download it from the Releases page.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Финансовый помощник ${{ github.ref_name }}
          generate_release_notes: true
          files: src-tauri/target/release/bundle/nsis/*.exe
