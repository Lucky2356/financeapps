name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    name: Verify app
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: financial_assistant
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d financial_assistant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/financial_assistant?schema=public
      NEXT_PUBLIC_APP_PLATFORM: web
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_API_MODE: cloud
      NEXT_PUBLIC_API_BASE_URL: /api
      NEXT_PUBLIC_DESKTOP_DATA_MODE: cloud

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Seed demo data
        run: npm run db:seed

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage thresholds
        run: npm run test:coverage

      - name: Build web
        run: npm run build

      - name: Build static shell
        run: npm run build:static

  e2e:
    name: E2E (desktop static build)
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_PLATFORM: desktop
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_API_MODE: local
      NEXT_PUBLIC_DESKTOP_DATA_MODE: local
      NEXT_OUTPUT: export

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build static desktop shell
        run: npm run build:static

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
